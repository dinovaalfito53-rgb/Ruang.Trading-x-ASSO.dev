    <main class="page-content fade-in">
        <h1 class="page-title">Lot Size <span class="accent">Calculator</span></h1>
        <p class="subtitle">XAUUSD • Contract size 100 oz • $1.00/pip</p>

        <div class="tool-container">
            <div class="calc-card">
                <div class="input-group">
                    <label>Balance ($)</label>
                    <input type="number" id="balance" value="10000" min="1" class="calc-input">
                </div>
                <div class="input-group">
                    <label>Risk (%)</label>
                    <input type="number" id="risk" value="1" min="0.1" step="0.1" class="calc-input">
                </div>
                <div class="input-group">
                    <label>Stop Loss (pips)</label>
                    <input type="number" id="stopLoss" value="50" min="1" class="calc-input">
                </div>
                <button id="calcBtn" class="btn-primary">Calculate Lots</button>
                <div id="calcResult" class="result">--</div>
                <div class="note">Contract Size: 100 oz · Pip Value: $1.00/lot</div>
            </div>
        </div>
    </main>
